<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Study Ireland</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0f172a, #1d4ed8);
      color: #fff;
    }

    main {
      width: min(32rem, calc(100% - 3rem));
      padding: 3rem 2rem;
      border-radius: 1rem;
      text-align: center;
      background: rgba(15, 23, 42, 0.75);
      box-shadow: 0 1.5rem 3rem rgba(15, 23, 42, 0.25);
    }

    h1 {
      margin: 0 0 1rem;
      font-size: clamp(2rem, 6vw, 3rem);
    }

    p {
      margin: 0;
      font-size: 1.125rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <h1>Study Ireland</h1>
    <p>Our website is currently under construction. Please check back soon.</p>
  </main>
</body>
</html>
